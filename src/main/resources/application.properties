spring.application.name=lu-librisync

# Local MySQL runtime used by the Tomcat deployments for this project.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/lu_librisync?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila
spring.datasource.username=root
spring.datasource.password=ppg123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep SQL and startup logs informative for local debugging
spring.jpa.open-in-view=false
spring.main.banner-mode=console
server.error.include-message=always

# JWT
app.jwt.secret=${LU_LIBRISYNC_JWT_SECRET:LU_LIBRISYNC_DEV_JWT_SECRET_CHANGE_THIS_TO_AT_LEAST_32_BYTES}
app.jwt.expiration-ms=${LU_LIBRISYNC_JWT_EXPIRATION_MS:86400000}

# Gmail / SMTP config for student profile OTP emails
app.mail.smtp.host=${LU_LIBRISYNC_SMTP_HOST:smtp.example.com}
app.mail.smtp.port=${LU_LIBRISYNC_SMTP_PORT:587}
app.mail.smtp.username=${LU_LIBRISYNC_SMTP_USERNAME:}
app.mail.smtp.password=${LU_LIBRISYNC_SMTP_PASSWORD:}
app.mail.sender.email=${LU_LIBRISYNC_SENDER_EMAIL:noreply@lulibrisync.local}
